prometheus:
  prometheusSpec:
    retention: 90d
    storageSpec:
      volumeClaimTemplate:
        spec:
          accessModes: ["ReadWriteOnce"]
          resources:
            requests:
              storage: 50Gi
    
    # Thanos sidecar para backup no Azure Blob
    thanos:
      objectStorageConfig:
        name: thanos-objstore-config
        key: objstore.yml

grafana:
  enabled: false  # Grafana será instalado separadamente

alertmanager:
  enabled: true
