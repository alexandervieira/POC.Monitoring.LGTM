global:
  environment: prod
  gcpProjectId: ${GCP_PROJECT_ID}
  storageBucket: ${PROJECT_ID}-prod-loki-logs

grafana:
  enabled: true
  replicas: 2
  persistence:
    enabled: false  # Usa GCS para persistência
  env:
    GF_AUTH_ANONYMOUS_ENABLED: "true"
    GF_AUTH_ANONYMOUS_ORG_ROLE: "Viewer"
    GF_SECURITY_ALLOW_EMBEDDING: "true"  # Permite iframe para React
    GF_SERVER_ROOT_URL: "https://grafana.${DOMAIN}"
    GF_SERVE_FROM_SUB_PATH: "true"
  
  grafana.ini:
    auth:
      disable_login_form: true
    auth.anonymous:
      enabled: true
      org_role: Viewer
    security:
      allow_embedding: true
    server:
      root_url: https://grafana.${DOMAIN}
  
  datasources:
    datasources.yaml:
      apiVersion: 1
      datasources:
        - name: Prometheus
          type: prometheus
          url: http://prometheus-server:80
          access: proxy
          isDefault: true
        
        - name: Loki
          type: loki
          url: http://loki:3100
          access: proxy
          jsonData:
            derivedFields:
              - datasourceUid: tempo
                matcherRegex: tid=(\w+)
                name: TraceId
                url: $${__value.raw}
        
        - name: Tempo
          type: tempo
          url: http://tempo:3200
          access: proxy
          jsonData:
            tracesToLogsV2:
              datasourceUid: loki
              filterByTraceID: true
              spanStartTimeShift: -1h
              spanEndTimeShift: 1h

loki:
  enabled: true
  replicas: 2
  storage:
    type: gcs
    gcs:
      bucketName: ${PROJECT_ID}-prod-loki-logs
      chunkBufferSize: 10485760
      requestTimeout: 0
  
  config:
    auth_enabled: false
    limits_config:
      retention_period: 2160h  # 90 dias
      allow_structured_metadata: true
    
    schema_config:
      configs:
        - from: "2024-01-01"
          store: tsdb
          object_store: gcs
          schema: v13
          index:
            prefix: loki_index_
            period: 24h
    
    storage_config:
      tsdb_shipper:
        active_index_directory: /var/loki/index
        shared_store: gcs
        cache_location: /var/loki/cache
      gcs:
        bucket_name: ${PROJECT_ID}-prod-loki-logs
    
    compactor:
      working_directory: /var/loki/compactor
      shared_store: gcs
      retention_enabled: true
      retention_delete_delay: 2h

tempo:
  enabled: true
  replicas: 2
  storage:
    trace:
      backend: gcs
      gcs:
        bucket_name: ${PROJECT_ID}-prod-tempo-traces
        prefix: traces
    
  tempo:
    retention: 2160h  # 90 dias
    metrics_generator:
      enabled: true
      processors:
        - service-graphs
        - span-metrics
      registry:
        external_labels:
          cluster: prod-gke
          namespace: monitoring
    
    overrides:
      defaults:
        metrics_generator:
          processors: [service-graphs, span-metrics]

prometheus:
  enabled: true
  server:
    replicas: 2
    retention: 90d  # 90 dias
    
    # Configuração para Thanos ou GCS diretamente
    extraFlags:
      - storage.tsdb.retention.time=90d
      - storage.tsdb.retention.size=50GB
      - storage.tsdb.min-block-duration=2h
      - storage.tsdb.max-block-duration=2h
    
    persistentVolume:
      enabled: false  # Usa GCS via Thanos
    
    thanos:
      create: true
      service:
        type: ClusterIP
      objstoreConfig:
        type: GCS
        config:
          bucket: ${PROJECT_ID}-prod-prometheus-metrics

alloy:
  enabled: true
  image: grafana/alloy:v1.7.5
  replicas: 2
  configMap:
    name: alloy-config
    mountPath: /etc/alloy