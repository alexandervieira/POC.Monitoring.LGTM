global:
  environment: dev
  gcpProjectId: ${GCP_PROJECT_ID}  # Será substituído pelo script
  storageBucket: ${PROJECT_ID}-dev-loki-logs
  domain: dev.mydomain.com

# Grafana - Configuração simplificada para dev
grafana:
  enabled: true
  replicas: 1
  persistence:
    enabled: false  # Sem persistência em dev
  
  # Configuração básica
  env:
    GF_AUTH_ANONYMOUS_ENABLED: "true"
    GF_AUTH_ANONYMOUS_ORG_ROLE: "Admin"
    GF_SECURITY_ALLOW_EMBEDDING: "true"
    GF_SERVER_ROOT_URL: "https://grafana-dev.${DOMAIN}"
    GF_LOG_LEVEL: "debug"  # Mais logs para debug
  
  grafana.ini:
    auth:
      disable_login_form: true
    auth.anonymous:
      enabled: true
      org_role: Admin
    security:
      allow_embedding: true
    server:
      root_url: https://grafana-dev.${DOMAIN}
    log:
      level: debug
      mode: console
  
  # Dashboards pré-configurados para testes
  dashboardProviders:
    dashboardproviders.yaml:
      apiVersion: 1
      providers:
        - name: 'default'
          orgId: 1
          folder: ''
          type: file
          disableDeletion: false
          editable: true
          options:
            path: /var/lib/grafana/dashboards/default
  
  dashboards:
    default:
      aspnet-core-metrics:
        gnetId: 19924
        revision: 1
        datasource: Prometheus
      aspnet-core-endpoint:
        gnetId: 19925
        revision: 1
        datasource: Prometheus
  
  datasources:
    datasources.yaml:
      apiVersion: 1
      datasources:
        - name: Prometheus
          type: prometheus
          url: http://prometheus-server:80
          access: proxy
          isDefault: true
          version: 1
          editable: true
        
        - name: Loki
          type: loki
          url: http://loki:3100
          access: proxy
          version: 1
          editable: true
          jsonData:
            derivedFields:
              - datasourceUid: tempo
                matcherRegex: tid=(\w+)
                name: TraceId
                url: $${__value.raw}
        
        - name: Tempo
          type: tempo
          url: http://tempo:3200
          access: proxy
          version: 1
          editable: true
          jsonData:
            tracesToLogsV2:
              datasourceUid: loki
              filterByTraceID: true
              spanStartTimeShift: '-1h'
              spanEndTimeShift: '1h'
            serviceMap:
              datasourceUid: prometheus
            search:
              hide: false
            nodeGraph:
              enabled: true

# Loki - Configuração para desenvolvimento
loki:
  enabled: true
  replicas: 1  # Single replica em dev
  
  # Recursos reduzidos para dev
  resources:
    requests:
      cpu: 100m
      memory: 128Mi
    limits:
      cpu: 500m
      memory: 512Mi
  
  storage:
    type: gcs
    gcs:
      bucketName: ${PROJECT_ID}-dev-loki-logs
      chunkBufferSize: 5242880  # 5MB
      requestTimeout: 30s
  
  config:
    auth_enabled: false
    
    server:
      http_listen_port: 3100
      grpc_listen_port: 9095
      log_level: debug  # Debug em dev
    
    limits_config:
      retention_period: 720h  # 30 dias para dev
      allow_structured_metadata: true
      max_entries_limit_per_query: 5000
      max_global_streams_per_user: 5000
      ingestion_rate_mb: 10
      ingestion_burst_size_mb: 20
    
    schema_config:
      configs:
        - from: "2024-01-01"
          store: tsdb
          object_store: gcs
          schema: v13
          index:
            prefix: loki_index_
            period: 24h
    
    storage_config:
      tsdb_shipper:
        active_index_directory: /var/loki/index
        shared_store: gcs
        cache_location: /var/loki/cache
        cache_ttl: 24h
      gcs:
        bucket_name: ${PROJECT_ID}-dev-loki-logs
    
    compactor:
      working_directory: /var/loki/compactor
      shared_store: gcs
      retention_enabled: true
      retention_delete_delay: 2h
      delete_request_store: gcs
    
    ingester:
      lifecycler:
        ring:
          replication_factor: 1
          kvstore:
            store: inmemory
      chunk_idle_period: 15m
      chunk_retain_period: 30s
      max_chunk_age: 45m
    
    querier:
      query_ingesters_within: 3h
    
    query_range:
      parallelise_shardable_queries: true
      cache_results: true
      results_cache:
        cache:
          enable_fifocache: true
          fifocache:
            max_size_bytes: 100MB
            validity: 1h

# Tempo - Configuração simplificada
tempo:
  enabled: true
  replicas: 1
  
  # Recursos reduzidos
  resources:
    requests:
      cpu: 100m
      memory: 256Mi
    limits:
      cpu: 500m
      memory: 1Gi
  
  storage:
    trace:
      backend: gcs
      gcs:
        bucket_name: ${PROJECT_ID}-dev-tempo-traces
        prefix: traces
        chunk_buffer_size: 10485760  # 10MB
        endpoint: storage.googleapis.com
        hedge_requests_at: 200ms
        hedge_requests_up_to: 2
    
    wal:
      path: /var/tempo/wal
      encoding: snappy
      bloom_filter_false_positive: 0.01
      index_downsample: 10
      ingester_age_range_multiplier: 2
    
  tempo:
    retention: 720h  # 30 dias
    
    server:
      http_listen_port: 3200
      grpc_listen_port: 9095
      log_level: debug
    
    distributor:
      receivers:
        otlp:
          protocols:
            grpc:
              endpoint: 0.0.0.0:4317
            http:
              endpoint: 0.0.0.0:4318
        jaeger:
          protocols:
            thrift_http:
              endpoint: 0.0.0.0:14268
            grpc:
              endpoint: 0.0.0.0:14250
    
    ingester:
      max_block_duration: 10m  # Mais curto para dev
      max_block_bytes: 500_000_000  # 500MB
      lifecycler:
        ring:
          replication_factor: 1
          kvstore:
            store: inmemory
    
    compactor:
      compaction:
        block_retention: 720h
        compaction_window: 1h
        max_block_bytes: 100_000_000_000
        max_compaction_objects: 1000000
        block_retention: 720h
    
    metrics_generator:
      enabled: true
      processors:
        - service-graphs
        - span-metrics
        - local-blocks
      registry:
        external_labels:
          source: tempo
          cluster: dev-gke
          namespace: monitoring
        collection_interval: 15s
      storage:
        path: /var/tempo/generator/wal
        remote_write:
          - url: http://prometheus-server:9090/api/v1/write
            send_exemplars: true
            max_retries: 3
    
    overrides:
      defaults:
        metrics_generator:
          processors: [service-graphs, span-metrics, local-blocks]
          generate_native_histograms: both
        global:
          max_bytes_per_trace: 5000000
          max_search_bytes_per_trace: 5000

# Prometheus - Configuração dev
prometheus:
  enabled: true
  
  server:
    replicas: 1
    retention: 720h  # 30 dias
    
    resources:
      requests:
        cpu: 100m
        memory: 256Mi
      limits:
        cpu: 500m
        memory: 1Gi
    
    # Configuração para OTLP receiver
    extraFlags:
      - web.enable-otlp-receiver
      - storage.tsdb.retention.time=30d
      - storage.tsdb.retention.size=10GB
      - storage.tsdb.min-block-duration=2h
      - storage.tsdb.max-block-duration=2h
      - storage.tsdb.wal-compression
      - enable-feature=exemplar-storage
      - enable-feature=otlp-write-receiver
    
    persistentVolume:
      enabled: false  # Usa GCS via Thanos
    
    # Configuração do thanos sidecar
    thanos:
      create: true
      version: v0.34.0
      service:
        type: ClusterIP
        grpcPort: 10901
        httpPort: 10902
      objstoreConfig:
        type: GCS
        config:
          bucket: ${PROJECT_ID}-dev-prometheus-metrics
          prefix: prometheus
    
    # Configuração para coletar métricas da API
    extraScrapeConfigs: |
      - job_name: 'apicontagem'
        scrape_interval: 5s
        metrics_path: /metrics
        static_configs:
          - targets: ['apicontagem-dev.default.svc.cluster.local:8080']
            labels:
              environment: dev
              app: apicontagem
      
      - job_name: 'alloy'
        scrape_interval: 10s
        static_configs:
          - targets: ['alloy.monitoring.svc.cluster.local:12345']
            labels:
              environment: dev
              app: alloy
      
      - job_name: 'kubernetes-pods'
        kubernetes_sd_configs:
          - role: pod
        relabel_configs:
          - source_labels: [__meta_kubernetes_pod_annotation_prometheus_io_scrape]
            action: keep
            regex: true
          - source_labels: [__meta_kubernetes_pod_annotation_prometheus_io_path]
            action: replace
            target_label: __metrics_path__
            regex: (.+)
          - source_labels: [__address__, __meta_kubernetes_pod_annotation_prometheus_io_port]
            action: replace
            regex: ([^:]+)(?::\d+)?;(\d+)
            replacement: $1:$2
            target_label: __address__
          - action: labelmap
            regex: __meta_kubernetes_pod_label_(.+)
          - source_labels: [__meta_kubernetes_namespace]
            action: replace
            target_label: kubernetes_namespace
          - source_labels: [__meta_kubernetes_pod_name]
            action: replace
            target_label: kubernetes_pod_name
          - source_labels: [__meta_kubernetes_pod_phase]
            regex: Failed|Succeeded
            action: drop
  
  # Alertmanager opcional em dev
  alertmanager:
    enabled: false  # Desabilitado em dev
  
  # Node exporter opcional
  nodeExporter:
    enabled: false
  
  # Pushgateway desabilitado
  pushgateway:
    enabled: false

# Alloy - Configuração com sanitização ativa
alloy:
  enabled: true
  image:
    repository: grafana/alloy
    tag: v1.7.5
  
  replicas: 1
  
  resources:
    requests:
      cpu: 100m
      memory: 128Mi
    limits:
      cpu: 500m
      memory: 512Mi
  
  # ConfigMap será aplicado separadamente
  configMap:
    name: alloy-config
    mountPath: /etc/alloy
  
  ports:
    - name: http
      containerPort: 12345
      protocol: TCP
    - name: otlp-grpc
      containerPort: 4317
      protocol: TCP
    - name: otlp-http
      containerPort: 4318
      protocol: TCP
  
  service:
    ports:
      - name: http
        port: 12345
        targetPort: 12345
      - name: otlp-grpc
        port: 4317
        targetPort: 4317
      - name: otlp-http
        port: 4318
        targetPort: 4318

# Configuração do Memcached (cache para Tempo)
memcached:
  enabled: true
  image:
    repository: memcached
    tag: 1.6.29-alpine
  
  replicas: 1
  
  resources:
    requests:
      cpu: 50m
      memory: 64Mi
    limits:
      cpu: 200m
      memory: 128Mi
  
  memcached:
    maxItemMemory: 64
    verbosity: v  # Verbose para debug
    extraArgs:
      - -I 5m  # Max item size 5MB
      - -c 1024  # Max connections